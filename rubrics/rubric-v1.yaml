    name: Hard requirements
    weight: TODO(owner)
    question: TODO(owner)
    # NOTE: this dimension is the soft-veto trigger (see aggregation).
    criteria:
      "5": TODO(owner)
      "3": TODO(owner)
      "1": TODO(owner)
    anchors: []

  - id: education_domain_fit
    name: Education / domain fit
    weight: TODO(owner)
    question: TODO(owner)
    # NOTE (from skills_coverage boundary decision): degree requirements
    # (e.g. "BS/MS in software engineering") are scored here.
    criteria:
      "5": TODO(owner)
      "3": TODO(owner)
      "1": TODO(owner)
    anchors: []